<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 540" role="img" aria-label="Abstract cybersecurity scanning and detection visual">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f7f8"/>
      <stop offset="1" stop-color="#eef3f7"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" x2="1">
      <stop offset="0" stop-color="#c8e8ff" stop-opacity="0"/>
      <stop offset=".45" stop-color="#58b6ff" stop-opacity=".95"/>
      <stop offset="1" stop-color="#8cff6b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" x2="1">
      <stop offset="0" stop-color="#ff3b2f"/>
      <stop offset="1" stop-color="#ff8f7e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#05053f" flood-opacity=".09"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0v34" fill="none" stroke="#05053f" stroke-opacity=".075" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="540" fill="url(#bg)"/>
  <rect x="80" y="44" width="1440" height="450" fill="url(#grid)" opacity=".42"/>

  <g opacity=".92" filter="url(#softShadow)">
